<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1400" width="1400" height="1400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2D4A3E"/>
      <stop offset="60%" stop-color="#3F5E48"/>
      <stop offset="100%" stop-color="#5B5550" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="overlay" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.35"/>
    </linearGradient>
    <radialGradient id="sunglow" cx="80%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#E8B547" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#E8B547" stop-opacity="0.0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1400" height="1400" fill="url(#bg)"/>
  <rect width="1400" height="1400" fill="url(#sunglow)"/>
  <rect width="1400" height="1400" fill="url(#overlay)"/>

  <!-- Mountain silhouettes (Norte PT) -->
  <path d="M0,1100 L180,920 L320,1010 L520,820 L740,950 L920,830 L1140,940 L1400,860 L1400,1400 L0,1400 Z"
        fill="#1F2820" fill-opacity="0.32"/>
  <path d="M0,1180 L240,1050 L460,1110 L680,970 L920,1080 L1180,990 L1400,1050 L1400,1400 L0,1400 Z"
        fill="#1F2820" fill-opacity="0.55"/>

  <!-- Top brand bar -->
  <rect x="80" y="80" width="240" height="6" fill="#F5EFE6" opacity="0.9"/>
  <text x="80" y="160" fill="#F5EFE6" font-family="Manrope, sans-serif"
        font-size="36" font-weight="700" letter-spacing="4">LUSITANO RETREAT</text>
  <text x="80" y="200" fill="#F5EFE6" font-family="Manrope, sans-serif"
        font-size="22" font-weight="500" letter-spacing="3" opacity="0.85">MORNING ENERGY · 21-DAY SPRINT</text>

  <!-- Day badge -->
  <g transform="translate(1180,140)">
    <circle cx="0" cy="0" r="90" fill="#5B5550" stroke="#F5EFE6" stroke-width="4"/>
    <text x="0" y="-10" fill="#F5EFE6" font-family="Manrope, sans-serif"
          font-size="22" font-weight="600" letter-spacing="2" text-anchor="middle">PODCAST</text>
    <text x="0" y="42" fill="#F5EFE6" font-family="Manrope, sans-serif"
          font-size="62" font-weight="800" text-anchor="middle">15</text>
  </g>

  <!-- Icon -->
  <text x="80" y="450" font-size="120">🔥</text>

  <!-- Title -->
  <text x="80" y="540" fill="#F5EFE6" font-family="Manrope, -apple-system, sans-serif" font-size="96" font-weight="800" letter-spacing="-0.5">Farma w Portugalii za</text><text x="80" y="647" fill="#F5EFE6" font-family="Manrope, -apple-system, sans-serif" font-size="96" font-weight="800" letter-spacing="-0.5">zero euro</text>

  <!-- Accent line under title -->
  <rect x="80" y="697" width="100" height="5" fill="#5B5550"/>

  <!-- Subtitle -->
  <text x="80" y="757" fill="#F5EFE6" font-family="Manrope, -apple-system, sans-serif" font-size="40" font-weight="400" letter-spacing="-0.5">Producenci, spółdzielnie i programy publiczne</text>

  <!-- Footer -->
  <text x="80" y="1320" fill="#F5EFE6" font-family="Manrope, sans-serif"
        font-size="22" font-weight="500" letter-spacing="2" opacity="0.7">LUSITANORETREAT.COM · NORTE PORTUGAL</text>
  <text x="1320" y="1320" fill="#F5EFE6" font-family="Manrope, sans-serif"
        font-size="22" font-weight="600" text-anchor="end" opacity="0.8">PL · 2026</text>
</svg>